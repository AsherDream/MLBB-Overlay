<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Broadcast Overlay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #overlayFit {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: transparent;
        }

        #overlayRoot {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: transparent;
        }

        .layer {
            position: absolute;
            inset: 0;
        }

        #componentsLayer {
            z-index: 10;
        }

        #bgLayer {
            z-index: 1;
            pointer-events: none;
        }

        #frameLayer {
            z-index: 100;
            pointer-events: none;
        }

        .layer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .component {
            position: absolute;
            overflow: hidden;
            box-sizing: border-box;
            transition: all 0.5s ease-in-out;
            margin: 0;
            padding: 0;
        }

        .component * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .component-fade-in {
            opacity: 0;
            transform: translateY(10px);
            animation: component-fade-in 0.4s ease-out forwards;
        }

        @keyframes component-fade-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .img-flash {
            animation: img-flash 0.25s ease-out;
        }

        @keyframes img-flash {
            0% { transform: scale(0.96); filter: brightness(1.6); }
            100% { transform: scale(1); filter: none; }
        }

        .img-pop {
            animation: img-pop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes img-pop {
            0% { transform: scale(0.7); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* The Banned Hero Portrait Container */
        .smartbox-ban {
            position: relative;
            overflow: hidden;
            filter: grayscale(100%) brightness(60%);
            border: 2px solid #ff4d4d;
        }

        /* The "Slash" Animation */
        .smartbox-ban::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -100%;
            width: 300%;
            height: 10px;
            background: rgba(255, 0, 0, 0.8);
            transform: rotate(-45deg);
            box-shadow: 0 0 15px #ff0000;
            animation: ban-slash 0.3s ease-out forwards;
        }

        @keyframes ban-slash {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Entry Slam Animation */
        .ban-entry {
            animation: slam-in 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slam-in {
            0% { transform: scale(2); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .component.text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
        }

        .component img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
    <div id="overlayFit">
        <div id="overlayRoot">
            <div id="bgLayer" class="layer"><img id="bgImage" alt="" /></div>
            <div id="componentsLayer" class="layer"></div>
            <div id="frameLayer" class="layer"><img id="frameImage" alt="" /></div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
