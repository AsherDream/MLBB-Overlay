<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Broadcast Overlay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #overlayRoot {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: transparent;
        }

        .layer {
            position: absolute;
            inset: 0;
        }

        #componentsLayer {
            z-index: 10;
        }

        #bgLayer {
            z-index: 1;
            pointer-events: none;
        }

        #frameLayer {
            z-index: 100;
            pointer-events: none;
        }

        .layer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .component {
            position: absolute;
            overflow: hidden;
            box-sizing: border-box;
            transition: all 0.5s ease-in-out;
        }

        .component.text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
        }

        .component img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
    <div id="overlayRoot">
        <div id="bgLayer" class="layer"><img id="bgImage" alt="" /></div>
        <div id="componentsLayer" class="layer"></div>
        <div id="frameLayer" class="layer"><img id="frameImage" alt="" /></div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
