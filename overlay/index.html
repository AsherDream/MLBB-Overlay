<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Broadcast Overlay</title>
    <link rel="icon" href="http://localhost:3000/favicon.ico">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --main-font: Arial, sans-serif;
            --font-size-multiplier: 1;

            --theme-bluePrimary: #00d2ff;
            --theme-blueDark: #003e4d;
            --theme-redPrimary: #ff2a2a;
            --theme-redDark: #4d0000;
            --theme-scoreBlue: #00d2ff;
            --theme-scoreRed: #ff2a2a;
            --theme-playerName: #ffffff;
            --theme-phaseText: #ffffff;
            --theme-auraBan: #ff0000;
            --theme-auraPick: #ffffff;

            --toggle-disableGlow: 0;
            --toggle-hidePattern: 0;
            --toggle-disableBoxShadow: 0;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: var(--main-font);
            overflow: hidden;
            color: var(--theme-playerName);
        }

        #overlayFit {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: transparent;
        }

        #overlayRoot {
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 0;
            left: 0;
            background: transparent;
            transform-origin: top left;
            overflow: hidden;
        }

        .overlay-master {
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            overflow: hidden;
        }

        .layer {
            position: absolute;
            inset: 0;
        }

        #componentsLayer {
            z-index: 110;
        }

        #bgLayer {
            z-index: 1;
            pointer-events: none;
        }

        #background-layer {
            z-index: 2;
            pointer-events: none;
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100% 100%;
        }

        #frameLayer {
            z-index: 100;
            pointer-events: none;
        }

        #frame-layer {
            z-index: 90;
            pointer-events: none;
        }

        #master-frame-layer {
            position: absolute;
            inset: 0;
            z-index: 95;
            pointer-events: none;
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100% 100%;
        }

        #lower-bg {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100% 100%;
        }

        #lower-mid-bg {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100% 100%;
        }

        .layer img {
            width: 100%;
            height: 100%;
            display: block;
        }
        #bgImage {
            object-fit: cover;
        }
        #frameImage {
            object-fit: contain;
        }

        .component {
            position: absolute;
            overflow: hidden;
            box-sizing: border-box;
            transition: all 0.5s ease-in-out;
            margin: 0;
            padding: 0;
        }

        .component * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .component-fade-in {
            opacity: 0;
            transform: translateY(10px);
            animation: component-fade-in 0.4s ease-out forwards;
        }

        @keyframes component-fade-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .img-flash {
            animation: img-flash 0.25s ease-out;
        }

        @keyframes img-flash {
            0% { transform: scale(0.96); filter: brightness(1.6); }
            100% { transform: scale(1); filter: none; }
        }

        .img-pop {
            animation: img-pop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes img-pop {
            0% { transform: scale(0.7); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* The Banned Hero Portrait Container */
        .smartbox-ban {
            position: relative;
            overflow: hidden;
            filter: grayscale(100%) brightness(60%);
            border: 2px solid #ff4d4d;
        }

        /* The "Slash" Animation */
        .smartbox-ban::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -100%;
            width: 300%;
            height: 10px;
            background: rgba(255, 0, 0, 0.8);
            transform: rotate(-45deg);
            box-shadow: 0 0 15px #ff0000;
            animation: ban-slash 0.3s ease-out forwards;
        }

        @keyframes ban-slash {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Entry Slam Animation */
        .ban-entry {
            animation: slam-in 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slam-in {
            0% { transform: scale(2); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .component.text {
            color: var(--theme-playerName);
            font-size: calc(24px * var(--font-size-multiplier));
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
        }

        .component img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
    <div id="overlayFit">
        <div id="overlayRoot" class="overlay-master">
            <div id="bgLayer" class="layer">
                <img id="bgImage" alt="" style="width:100%; height:100%; object-fit:cover;" />
            </div>
    
            <div id="background-layer" class="layer"></div>
    
            <div id="componentsLayer" class="layer"></div>
    
            <div id="master-frame-layer" class="layer"></div>
    
            <div id="frameLayer" class="layer">
                <img id="frameImage" alt="" style="width:100%; height:100%; object-fit:contain; pointer-events:none;" />
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
